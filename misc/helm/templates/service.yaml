apiVersion: v1
kind: Service
metadata:
  name: react-ssr-web-service
spec:
  type: ClusterIP
  selector:
    app: react-ssr-web
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: aspnetcore-web-service
spec:
  type: ClusterIP
  selector:
    app: aspnetcore-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80