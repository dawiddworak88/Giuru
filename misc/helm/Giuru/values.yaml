# Default values for helm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
environment: "#{Environment}#"
nodeEnvironment: "#{NodeEnvironment}#"
isMarketplace: "#{IsMarketplace}#"
organisationId: "#{OrganisationId}#"
serverSideRenderingEndpoint: "#{ServerSideRenderingEndpoint}#"
identityUrl: "#{IdentityUrl}#"
mediaUrl: "#{MediaUrl}#"
catalogUrl: "#{CatalogUrl}#"
elasticsearchUrl: "#{ElasticsearchUrl}#"
seqUrl: "#{SeqUrl}#"
defaultCulture: "en"
supportedCultures: "en,de,pl"
mediaApi:
  connectionString: "#{MediaApi--ConnectionString}#"
  storageConnectionString: "#{MediaApi--StorageConnectionString}#"
catalogApi:
  connectionString: "#{CatalogApi--ConnectionString}#"
  elasticsearchIndex: "catalog"
  brands: "#{CatalogApi--Brands}#"
identityApi:
  azureKeyVaultGiuruIdentityServer4Certificate: "#{IdentityApi--AzureKeyVaultGiuruIdentityServer4Certificate}#"
  azureKeyVaultClientId: "#{IdentityApi--AzureKeyVaultClientId}#"
  azureKeyVaultClientSecret: "#{IdentityApi--AzureKeyVaultClientSecret}#"
  connectionString: "#{IdentityApi--ConnectionString}#"
  clients: "#{IdentityApi--Clients}#"
  accounts: "#{IdentityApi--Accounts}#"
  organisations: "#{IdentityApi--Organisations}#"
  privacyPolicy: "#{IdentityApi--PrivacyPolicy}#"
  regulations: "#{IdentityApi--Regulations}#"
buyerWeb:
  clientId: "#{BuyerWeb--ClientId}#"
  clientSecret: "#{BuyerWeb--ClientSecret}#"
sellerWeb:
  clientId: "#{SellerWeb--ClientId}#"
  clientSecret: "#{SellerWeb--ClientSecret}#"