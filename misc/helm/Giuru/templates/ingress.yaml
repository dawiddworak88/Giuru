apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: wildcard-giuru-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
  - hosts:
    - {{ .Values.ingress.domain }}
    - {{ .Values.ingress.accountdomain }}
    - {{ .Values.ingress.tenantportaldomain }}
    secretName: wildcard
  rules:
  - host: {{ .Values.ingress.domain }}
    http:
      paths:
      - backend:
          serviceName: aspnetcore-web-service
          servicePort: 80
        path: /
  - host: {{ .Values.ingress.accountdomain }}
    http:
      paths:
      - backend:
          serviceName: account-web-service
          servicePort: 80
        path: /
  - host: {{ .Values.ingress.tenantportaldomain }}
    http:
      paths:
      - backend:
          serviceName: tenant-portal-web-service
          servicePort: 80
        path: /