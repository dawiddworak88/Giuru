apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: giuruingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  tls:
  - hosts:
    - giuru.com
    secretName: tls-secret
  - hosts:
    - account.giuru.com
    secretName: account-tls-secret
  rules:
  - host: giuru.com
    http:
      paths:
      - backend:
          serviceName: aspnetcore-web-service
          servicePort: 80
        path: /(.*)
  - host: account.giuru.com
    http:
      paths:
      - backend:
          serviceName: account-web-service
          servicePort: 80
        path: /(.*)