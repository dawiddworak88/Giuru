apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: giuru-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  tls:
  - hosts:
    - {{ .Values.giurudomain }}
    secretName: tls-secret
    - {{ .Values.accountgiurudomain }}
    secretName: tls-secret
  rules:
  - host: {{ .Values.giurudomain }}
    http:
      paths:
      - backend:
          serviceName: aspnetcore-web-service
          servicePort: 80
        path: /(.*)
  - host: {{ .Values.accountgiurudomain }}
    http:
      paths:
      - backend:
          serviceName: account-web-service
          servicePort: 80
        path: /(.*)