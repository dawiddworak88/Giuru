apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: api
spec:
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api-container
        image: {{ .Values.image.registry }}/api:{{ .Values.image.tag }}
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-ssr-web-deployment
  labels:
    app: react-ssr-web
spec:
  selector:
    matchLabels:
      app: react-ssr-web
  template:
    metadata:
      labels:
        app: react-ssr-web
    spec:
      containers:
      - name: react-ssr-web-container
        image: {{ .Values.image.registry }}/react-ssr-web:{{ .Values.image.tag }}
        ports:
        - containerPort: 3000
