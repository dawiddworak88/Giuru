version: '3'
services:
  storybook-web:
    build: 
      context: ../../fe
      dockerfile: Dockerfile-storybook-local
    image: storybook-web:storybook
    restart: always
    environment: 
      NODE_ENV: development
    ports:
      - "8091:9009"
  react-ssr-web:
    build: 
      context: ../../fe
      dockerfile: Dockerfile-ssr-local
    image: react-ssr-web:react-ssr
    restart: always
    environment: 
      NODE_ENV: development
    ports:
      - "3000:3000"
  aspnetcore-web:
    build: 
      context: ../../be
      dockerfile: Dockerfile-AspNetCore
    image: aspnetcore-web:aspnetcore
    restart: always
    depends_on: 
      - react-ssr-web
    ports:
      - "51117:80"
  account-web:
    build: 
      context: ../../be
      dockerfile: Dockerfile-Account
    image: account-web:account
    restart: always
    depends_on: 
      - react-ssr-web
    ports:
      - "51177:9011"