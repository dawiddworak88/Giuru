version: '3'
services:
  giuru-sql:
    image: mcr.microsoft.com/mssql/server:2019-CU3-ubuntu-18.04
    restart: always
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: Gre@tPassw0rd
    ports:
      - "9018:1433"
  tenant-sql:
    image: mcr.microsoft.com/mssql/server:2019-CU3-ubuntu-18.04
    restart: always
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: Gre@tPassw0rd
    ports:
      - "9017:1433"
  tenant-rabbitmq:
    image: rabbitmq
    restart: always
  tenant-azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    restart: always
  react-ssr-web:
    build: 
      context: ../../fe
      dockerfile: Dockerfile-ssr-local
    image: react-ssr-web:react-ssr
    restart: always
    environment: 
      NODE_ENV: development
    ports:
      - "3000:3000"