version: '3.8'

services:

  seq:
    image: datalust/seq:latest
    restart: always

  rabbitmq:
    image: rabbitmq
    restart: always

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    restart: always

  react-ssr:
    image: ${REGISTRY:-giuru}/react-ssr:${PLATFORM:-linux}-${TAG:-latest}
    build: 
      context: ../../fe
      dockerfile: Dockerfile-ssr-local
    restart: always

  sqldata:
    image: mcr.microsoft.com/mssql/server:2019-CU3-ubuntu-18.04
    restart: always

  catalog-api:
    image: ${REGISTRY:-giuru}/catalog-api:${PLATFORM:-linux}-${TAG:-latest}
    build: 
      context: .
      dockerfile: Dockerfile-CatalogApi
    restart: always
    depends_on: 
      - sqldata
      - rabbitmq

  identity-api:
    image: ${REGISTRY:-giuru}/identity-api:${PLATFORM:-linux}-${TAG:-latest}
    build: 
      context: .
      dockerfile: Dockerfile-IdentityApi
    restart: always
    depends_on: 
      - sqldata
      - react-ssr

  basketdata:
    image: redis:alpine

  basket-api:
    image: ${REGISTRY:-giuru}/basket-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile-BasketApi
    depends_on:
      - basketdata
      - identity-api
      - rabbitmq

  ordering-api:
    image: ${REGISTRY:-giuru}/ordering-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile-OrderingApi
    depends_on:
      - catalog-api
      - rabbitmq

  ordering-backgroundtasks:
    image: ${REGISTRY:-giuru}/ordering-backgroundtasks:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile-OrderingBackgroundTasks
    depends_on:
      - catalog-api
      - rabbitmq

  webshoppingapigw:
    image: envoyproxy/envoy:v1.15.0

  webshoppingagg:
    image: ${REGISTRY:-giuru}/webshoppingagg:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile-WebShoppingAgg
    depends_on:
      - webshoppingapigw
      - identity-api
      - rabbitmq
      - ordering-api
      - catalog-api
      - basket-api

  ordering-signalrhub:
    image: ${REGISTRY:-giuru}/ordering-signalrhub:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile-OrderingSignalrHub
    depends_on:
      - identity-api
      - rabbitmq
      - ordering-api
      - catalog-api
      - basket-api

  seller-web:
    image: ${REGISTRY:-giuru}/seller-web:${PLATFORM:-linux}-${TAG:-latest}
    build: 
      context: .
      dockerfile: Dockerfile-SellerWeb
    restart: always
    depends_on: 
      - react-ssr
      - webshoppingagg

  buyer-web:
    image: ${REGISTRY:-giuru}/buyer-web:${PLATFORM:-linux}-${TAG:-latest}
    build: 
      context: .
      dockerfile: Dockerfile-BuyerWeb
    restart: always
    depends_on: 
      - react-ssr
      - webshoppingagg